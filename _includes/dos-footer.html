<footer class="dos-statusbar" role="contentinfo">
  <div class="dos-status-left">
    <span>{{ site.title | escape }}</span>
    <span>│</span>
    <span>{{ site.description | escape }}</span>
  </div>
  <div class="dos-status-right">
    <span>TAB/↑↓ to navigate · ENTER to select</span>
    <span>│</span>
    <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
  </div>
</footer>
