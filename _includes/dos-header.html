<header class="dos-site-header">
  <div class="dos-window">
    <div class="dos-titlebar">
      <div class="dos-titlebar-btns">
        <span class="dos-btn" aria-hidden="true">■</span>
      </div>
      <span class="dos-titlebar-text">{{ site.title | escape }}</span>
      <div class="dos-titlebar-btns">
        <span class="dos-btn" aria-hidden="true">▲</span>
        <span class="dos-btn" aria-hidden="true">▼</span>
      </div>
    </div>
    <nav class="dos-menubar" aria-label="Site navigation" id="main-nav">
      <a href="{{ '/' | relative_url }}"
         {% if page.url == '/' %}class="active" aria-current="page"{% endif %}
         data-hotkey-pos="0" tabindex="0">Home</a>
      <a href="{{ '/about/' | relative_url }}"
         {% if page.url == '/about/' %}class="active" aria-current="page"{% endif %}
         data-hotkey-pos="1" tabindex="0">About</a>
      {% if site.twitter_username %}
      <a href="https://twitter.com/{{ site.twitter_username }}" target="_blank" rel="noopener" data-hotkey-pos="1" tabindex="0">Twitter</a>
      {% endif %}
      {% if site.github_username %}
      <a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener" data-hotkey-pos="0" tabindex="0">GitHub</a>
      {% endif %}
      {% if site.substack_url %}
      <a href="{{ site.substack_url }}" target="_blank" rel="noopener" data-hotkey-pos="0" tabindex="0">Substack</a>
      {% endif %}
      {% if site.linktree_url %}
      <a href="{{ site.linktree_url }}" target="_blank" rel="noopener" data-hotkey-pos="0" tabindex="0">Linktree</a>
      {% endif %}
      {% if site.linkedin_url %}
      <a href="{{ site.linkedin_url }}" target="_blank" rel="noopener" data-hotkey-pos="0" tabindex="0">LinkedIn</a>
      {% endif %}
    </nav>
  </div>
</header>
