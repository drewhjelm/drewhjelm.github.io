<script>
(function () {
  'use strict';

  /* ── Keyboard vs mouse detection ── */
  document.addEventListener('mousedown', function () {
    document.body.classList.remove('using-keyboard');
  });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Tab' || e.key.startsWith('Arrow')) {
      document.body.classList.add('using-keyboard');
    }
  });

  /* ── Arrow-key list navigation ── */
  function arrowNav(listSelector, itemSelector) {
    var lists = document.querySelectorAll(listSelector);
    lists.forEach(function (list) {
      list.addEventListener('keydown', function (e) {
        var items = Array.from(list.querySelectorAll(itemSelector));
        var idx   = items.indexOf(document.activeElement);
        if (idx === -1) return;

        if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
          e.preventDefault();
          var next = items[(idx + 1) % items.length];
          if (next) next.focus();
        } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
          e.preventDefault();
          var prev = items[(idx - 1 + items.length) % items.length];
          if (prev) prev.focus();
        } else if (e.key === 'Home') {
          e.preventDefault();
          items[0].focus();
        } else if (e.key === 'End') {
          e.preventDefault();
          items[items.length - 1].focus();
        }
      });
    });
  }

  document.addEventListener('DOMContentLoaded', function () {
    /* Arrow nav: menu bar */
    arrowNav('#main-nav', 'a');

    /* Arrow nav: post list */
    arrowNav('.dos-post-list', 'a');

    /* Enter key activates links that are focused via keyboard */
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        var el = document.activeElement;
        if (el && el.tagName === 'A' && document.body.classList.contains('using-keyboard')) {
          el.click();
        }
      }
    });
  });
}());
</script>
