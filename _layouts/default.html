<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title | escape }} – {% endif %}{{ site.title | escape }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}">
  <link rel="stylesheet" href="{{ '/assets/css/msdos.css' | relative_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title | escape }}" href="{{ '/feed.xml' | relative_url }}">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to content</a>

  <div class="dos-desktop">
    {% include dos-header.html %}

    <main id="main-content" class="dos-window" style="flex:1;" tabindex="-1">
      {{ content }}
    </main>

    {% include dos-footer.html %}
  </div>

  {% include dos-keyboard.html %}
</body>
</html>
